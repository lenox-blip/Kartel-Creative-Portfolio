<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KARTEL CREATIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --k-green:#008C32;
  --k-green-bright:#00A63E;
  --k-green-dim:#006B26;
  --k-green-glow:rgba(0,140,50,0.2);
  --bg:#050505;
  --bg-card:#0e0e0e;
  --bg-surface:#0a0a0a;
  --bg-elevated:#161616;
  --text:#ececec;
  --text-dim:#777;
  --text-muted:#444;
  --border:#1a1a1a;
  --border-hover:#2a2a2a;
  /* Client accent — Technology & SaaS */
  --client-accent:#298DC1;
  --client-accent-glow:rgba(41,141,193,0.15);
  --client-accent-dim:rgba(41,141,193,0.4);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ═══ KARTEL LOGO SVG ═══ */
svg{display:block}

/* ═══ LOGIN GATE ═══ */
#login-gate{position:fixed;inset:0;background:var(--bg);z-index:2000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .6s cubic-bezier(.4,0,.2,1)}
#login-gate.dismissed{opacity:0;pointer-events:none}
.login-grid{position:absolute;inset:0;overflow:hidden;opacity:.04}
.login-grid::before{content:'';position:absolute;inset:-50%;width:200%;height:200%;background-image:linear-gradient(var(--client-accent) 1px,transparent 1px),linear-gradient(90deg,var(--client-accent) 1px,transparent 1px);background-size:80px 80px;animation:gridMove 20s linear infinite}
@keyframes gridMove{0%{transform:translate(0,0)}100%{transform:translate(80px,80px)}}
.login-box{text-align:center;width:420px;padding:48px;position:relative;z-index:1}
.login-collab{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:10px}
.login-collab .logo-kartel svg{width:140px;height:auto}
.login-collab .logo-divider{color:var(--text-muted);font-size:1.2rem;font-weight:200}
.login-collab .logo-client{font-size:1.4rem;font-weight:800;color:var(--client-accent);letter-spacing:2px}
.login-sub{color:var(--text-dim);font-size:.7rem;letter-spacing:3px;margin-bottom:44px;font-weight:400;text-transform:uppercase}
.login-accent-line{width:50px;height:2px;margin:0 auto 32px;background:linear-gradient(90deg,var(--k-green),var(--client-accent))}
.login-error{color:#cc3333;font-size:.78rem;margin-bottom:14px;min-height:1.4em;font-weight:500}
.login-box input{width:100%;padding:15px 20px;border-radius:4px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:.88rem;font-family:'JetBrains Mono',monospace;outline:none;margin-bottom:16px;text-align:center;letter-spacing:3px;transition:all .3s}
.login-box input:focus{border-color:var(--client-accent);box-shadow:0 0 0 3px var(--client-accent-glow)}
.login-box input::placeholder{color:var(--text-muted);letter-spacing:2px;font-family:'Outfit',sans-serif;font-size:.8rem}
.login-box button{width:100%;padding:15px;border:1px solid var(--client-accent);border-radius:4px;background:transparent;color:var(--client-accent);font-size:.78rem;font-weight:700;letter-spacing:3px;cursor:pointer;transition:all .3s;font-family:'Outfit',sans-serif;text-transform:uppercase}
.login-box button:hover{background:var(--client-accent);color:#000;box-shadow:0 0 30px var(--client-accent-glow)}

/* ═══ HERO BANNER ═══ */
.hero{padding:40px 48px 0;position:relative}
.hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.hero-brands{display:flex;align-items:center;gap:20px}
.hero-brands .kartel-mark svg{width:120px;height:auto}
.hero-brands .brand-x{color:var(--text-muted);font-size:1rem;font-weight:200}
.hero-brands .client-mark{font-size:1.6rem;font-weight:800;color:var(--client-accent);letter-spacing:3px}
.hero-badge{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--client-accent);letter-spacing:1px;padding:6px 14px;border:1px solid var(--client-accent-glow);border-radius:4px;background:rgba(0,0,0,.3)}
.hero-glow{height:1px;background:linear-gradient(90deg,transparent,var(--k-green-dim),var(--client-accent),var(--client-accent-dim),transparent);opacity:.4;margin-bottom:28px}
.hero-title{font-size:2rem;font-weight:800;letter-spacing:2px;margin-bottom:8px;color:var(--text)}
.hero-title span{color:var(--client-accent)}
.hero-desc{font-size:.88rem;color:var(--text-dim);max-width:700px;line-height:1.7;font-weight:300;margin-bottom:32px}
.hero-stats{display:flex;gap:32px;margin-bottom:8px}
.hero-stat{text-align:left}
.hero-stat-value{font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--client-accent)}
.hero-stat-label{font-size:.65rem;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

/* ═══ SECTION ═══ */
.section{padding:32px 48px 8px;animation:fadeInUp .5s ease both;position:relative;z-index:1}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.section-bar{width:3px;height:20px;border-radius:1px;flex-shrink:0}
.section-bar.green{background:var(--k-green)}
.section-bar.client{background:var(--client-accent)}
.section-title{font-size:.92rem;font-weight:700;color:var(--text);letter-spacing:1.5px;text-transform:uppercase}
.section-count{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text-muted);letter-spacing:1px}

/* ═══ VIDEO GRID ═══ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px;margin-bottom:12px}
.card{position:relative;border-radius:6px;overflow:hidden;cursor:pointer;background:var(--bg-card);transition:all .35s cubic-bezier(.25,.1,.25,1);border:1px solid transparent}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 48px rgba(0,0,0,.4),0 0 0 1px var(--border-hover);border-color:var(--border-hover)}
.card-thumb{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg-card)}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.25,.1,.25,1),filter .5s}
.card:hover .card-thumb img{transform:scale(1.06);filter:brightness(1.1)}
.card-thumb img.loading{animation:shimmer 1.8s ease-in-out infinite;opacity:.2}
@keyframes shimmer{0%,100%{opacity:.15}50%{opacity:.45}}
.card-thumb .thumb-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(145deg,#0a0a0a 0%,#141414 50%,#0d0d0d 100%);gap:10px}
.thumb-placeholder .tp-play{width:42px;height:42px;border:2px solid var(--client-accent);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .3s}
.card:hover .thumb-placeholder .tp-play{opacity:.9}
.tp-play::after{content:'';border-style:solid;border-width:6px 0 6px 11px;border-color:transparent transparent transparent var(--client-accent);margin-left:2px}
.thumb-placeholder .tp-name{font-size:.58rem;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;font-weight:500;max-width:80%;text-align:center;line-height:1.4;opacity:.6}
.card-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(5,5,5,.7) 0%,transparent 50%);opacity:0;transition:opacity .35s}
.card:hover .card-thumb::after{opacity:1}
.play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);width:56px;height:56px;border:2px solid rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .35s cubic-bezier(.25,.1,.25,1);backdrop-filter:blur(8px);background:var(--client-accent-glow)}
.card:hover .play-btn{opacity:1;transform:translate(-50%,-50%) scale(1)}
.play-btn::after{content:'';border-style:solid;border-width:8px 0 8px 14px;border-color:transparent transparent transparent #fff;margin-left:3px}
.card-info{padding:12px 14px 14px}
.card-info h3{font-size:.8rem;font-weight:600;color:var(--text);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-info p{font-size:.65rem;color:var(--text-muted);margin-top:4px;letter-spacing:.5px;font-weight:500;text-transform:uppercase}
.card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--client-accent);transform:scaleX(0);transition:transform .35s cubic-bezier(.25,.1,.25,1);transform-origin:left}
.card:hover::after{transform:scaleX(1)}

/* Autoplay on scroll — video iframe overlay */
.card .card-video-overlay{position:absolute;inset:0;width:100%;height:100%;border:none;z-index:2;pointer-events:none;opacity:0;transition:opacity .6s ease}
.card.autoplay-active .card-video-overlay{opacity:1}
.card.autoplay-active .play-btn{opacity:0 !important}
@keyframes sweepProgress{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
.card.autoplay-active::after{animation:sweepProgress 30s linear infinite;transition:none}

/* Hover expand preview after 0.5s */
.section.section-elevated{z-index:50}
.card.hover-expanded{transform:scale(1.45) translateY(-8px);z-index:100;box-shadow:0 30px 80px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.05);border-color:var(--border-hover)}
.card.hover-expanded .card-thumb img{transform:scale(1);filter:brightness(1.15)}
.card.hover-expanded .play-btn{opacity:0 !important}
.card.hover-expanded .card-video-overlay{opacity:1}

/* ═══ PLACEHOLDER CARD ═══ */
.card.placeholder{cursor:default;border:1px dashed var(--border)}
.card.placeholder:hover{transform:none;box-shadow:none;border-color:var(--client-accent-dim)}
.card.placeholder .card-thumb{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-elevated) 100%)}
.card.placeholder .card-thumb img{display:none}
.card.placeholder .play-btn{display:none}
.card.placeholder .placeholder-inner{text-align:center;padding:20px}
.card.placeholder .placeholder-icon{font-size:1.8rem;margin-bottom:8px;opacity:.3}
.card.placeholder .placeholder-text{font-size:.7rem;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600}
.card.placeholder .placeholder-sub{font-size:.62rem;color:var(--text-muted);margin-top:4px;opacity:.6;font-weight:300}
.card.placeholder::after{display:none}
.card.placeholder .card-info h3{color:var(--client-accent);font-weight:700;font-size:.75rem;letter-spacing:.5px}
.card.placeholder .card-info p{color:var(--text-muted)}

/* ═══ ENHANCED MODAL ═══ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(2,2,2,.97);z-index:1000;backdrop-filter:blur(20px)}
.modal-overlay.active{display:flex;animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0}to{opacity:1}}
.modal-container{display:flex;width:95vw;max-width:1400px;height:88vh;margin:auto;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--bg-card)}
.modal-main{flex:1;display:flex;flex-direction:column;min-width:0}
.modal-top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.modal-meta{min-width:0;flex:1;margin-right:12px}
.modal-title{color:var(--text);font-size:.92rem;font-weight:700;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-cat{color:var(--text-muted);font-size:.6rem;margin-top:2px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500}
.modal-actions{display:flex;gap:6px;align-items:center;flex-shrink:0}
.modal-pos{font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--text-muted);letter-spacing:1px;padding:4px 10px;border:1px solid var(--border);border-radius:3px;background:var(--bg)}
.modal-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:6px 10px;border-radius:4px;cursor:pointer;transition:all .2s;font-size:.78rem;line-height:1;font-family:'Outfit',sans-serif}
.modal-btn:hover{color:var(--text);border-color:var(--text-dim);background:var(--bg-elevated)}
.modal-player{flex:1;position:relative;display:flex;align-items:stretch;background:#000;overflow:hidden}
.modal-player iframe{width:100%;height:100%;border:none}
.modal-nav{position:absolute;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.55);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;z-index:10;backdrop-filter:blur(6px)}
.modal-nav:hover{background:var(--client-accent);border-color:var(--client-accent);color:#000}
.modal-nav:disabled{opacity:.15;cursor:default;pointer-events:none}
.modal-prev{left:12px}
.modal-next{right:12px}
.modal-sidebar{width:290px;border-left:1px solid var(--border);background:var(--bg);overflow-y:auto;flex-shrink:0}
.modal-sb-section{padding:18px;border-bottom:1px solid var(--border)}
.modal-sb-title{font-size:.62rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.modal-detail-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.modal-detail-row:last-child{border-bottom:none}
.modal-detail-label{font-size:.68rem;color:var(--text-muted);font-weight:500}
.modal-detail-value{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--text);font-weight:500;letter-spacing:.5px}
.modal-section-list{display:flex;flex-direction:column;gap:4px;max-height:42vh;overflow-y:auto}
.modal-section-item{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:4px;cursor:pointer;transition:all .2s;border:1px solid transparent}
.modal-section-item:hover{background:var(--bg-elevated);border-color:var(--border)}
.modal-section-item.active{background:rgba(0,140,50,.04);border-color:rgba(0,140,50,.1)}
.msi-thumb{width:56px;height:32px;border-radius:3px;overflow:hidden;flex-shrink:0;background:var(--bg-card)}
.msi-thumb img{width:100%;height:100%;object-fit:cover}
.msi-name{font-size:.66rem;font-weight:500;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.modal-section-item.active .msi-name{color:var(--client-accent)}
.modal-container.fullscreen{width:100vw;height:100vh;max-width:none;border-radius:0;border:none}
.modal-container.fullscreen .modal-sidebar{display:none}
@media(max-width:900px){.modal-sidebar{display:none}.modal-container{width:98vw;height:94vh}}
@media(max-width:768px){.modal-container{border-radius:0;height:100vh;width:100vw}}

/* ═══ INTRO VIDEO SPLASH ═══ */
#intro-splash{position:fixed;inset:0;z-index:3000;background:#000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity .8s cubic-bezier(.4,0,.2,1)}
#intro-splash.dismissed{opacity:0;pointer-events:none}
#intro-splash video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
#intro-splash .splash-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.5) 0%,transparent 40%,transparent 60%,rgba(0,0,0,.3) 100%);z-index:1}
.splash-enter{position:absolute;bottom:12vh;left:50%;transform:translateX(-50%);z-index:2;text-align:center;opacity:0;transition:opacity .8s ease,transform .8s ease;transform:translateX(-50%) translateY(20px)}
.splash-enter.visible{opacity:1;transform:translateX(-50%) translateY(0)}
.splash-enter-btn{padding:16px 48px;border:1px solid rgba(255,255,255,.5);border-radius:50px;background:rgba(0,0,0,.3);backdrop-filter:blur(12px);color:#fff;font-size:.82rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .4s;position:relative;overflow:hidden}
.splash-enter-btn:hover{background:var(--client-accent);border-color:var(--client-accent);color:#000;box-shadow:0 0 40px var(--client-accent-glow)}
.splash-enter-btn .btn-slide{position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--client-accent);transition:width 2s linear}
.splash-enter.visible .btn-slide{width:100%}
.splash-client-mark{font-size:.6rem;color:rgba(255,255,255,.4);letter-spacing:4px;text-transform:uppercase;margin-top:16px;font-weight:400}
#intro-splash.fizzle video{filter:blur(8px) brightness(.3);transition:filter 1.2s ease}
#intro-splash.fizzle .splash-overlay{background:rgba(0,0,0,.8);transition:background 1.2s ease}

/* ═══ FOOTER ═══ */
footer{text-align:center;padding:48px;border-top:1px solid var(--border);margin-top:40px}
.footer-collab{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;opacity:.4}
.footer-collab svg{width:80px;height:auto}
.footer-collab .fc-x{color:var(--text-muted);font-size:.8rem;font-weight:200}
.footer-collab .fc-client{font-size:.85rem;font-weight:700;color:var(--client-accent);letter-spacing:2px}
footer p{color:var(--text-muted);font-size:.62rem;letter-spacing:2px;text-transform:uppercase}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .hero{padding:24px 20px 0}
  .hero-top{flex-direction:column;align-items:flex-start;gap:12px}
  .hero-title{font-size:1.4rem}
  .hero-stats{gap:20px}
  .section{padding:20px 20px 4px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .modal-frame-wrap,.modal-top{width:95vw}
  .login-collab{flex-direction:column;gap:10px}
}
@media(max-width:480px){
  .grid{grid-template-columns:1fr 1fr;gap:10px}
  .hero-brands{flex-direction:column;align-items:flex-start;gap:6px}
}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="kartel-logo" viewBox="0 0 800 120">
    <path d="M10,10 L10,110 L40,110 L40,70 L50,60 L90,110 L130,110 L75,45 L125,10 L88,10 L40,55 L40,10 Z" fill="none" stroke="#008C32" stroke-width="3" stroke-linejoin="miter"/>
    <path d="M140,110 L185,10 L215,10 L260,110 L230,110 L220,85 L180,85 L170,110 Z M190,62 L210,62 L200,30 Z" fill="none" stroke="#008C32" stroke-width="3" stroke-linejoin="miter"/>
    <path d="M280,10 L280,110 L310,110 L310,72 L340,72 L365,110 L400,110 L370,68 C385,62 395,48 395,40 C395,22 380,10 358,10 Z M310,35 L352,35 C363,35 368,40 368,48 C368,56 363,62 352,62 L310,62 Z" fill="none" stroke="#008C32" stroke-width="3" stroke-linejoin="miter"/>
    <path d="M410,10 L510,10 L510,35 L475,35 L475,110 L445,110 L445,35 L410,35 Z" fill="none" stroke="#008C32" stroke-width="3" stroke-linejoin="miter"/>
    <path d="M530,10 L640,10 L640,35 L560,35 L560,48 L630,48 L630,72 L560,72 L560,85 L640,85 L640,110 L530,110 Z" fill="none" stroke="#008C32" stroke-width="3" stroke-linejoin="miter"/>
    <path d="M660,10 L660,110 L780,110 L780,85 L690,85 L690,10 Z" fill="none" stroke="#008C32" stroke-width="3" stroke-linejoin="miter"/>
  </symbol>
</svg>

<!-- ═══ INTRO VIDEO SPLASH ═══ -->
<div id="intro-splash">
  <video id="splashVideo" autoplay muted loop playsinline preload="auto">
    <source src="../kartel-intro.mp4" type="video/mp4">
  </video>
  <div class="splash-overlay"></div>
  <div class="splash-enter" id="splashEnter">
    <button class="splash-enter-btn" id="splashBtn">
      Enter Your Collection
      <div class="btn-slide"></div>
    </button>
    <div class="splash-client-mark" id="splashClient"></div>
  </div>
</div>

<div id="login-gate" class="hidden"><div class="login-grid"></div>
  <div class="login-box">
    <div class="login-collab">
      <div class="logo-kartel"><svg viewBox="0 0 800 120" aria-label="Kartel"><use href="#kartel-logo"/></svg></div>
      <div class="logo-divider">&times;</div>
      <div class="logo-client" id="loginClient"></div>
    </div>
    <div class="login-sub" id="loginSub">Private Collection</div>
    <div class="login-accent-line"></div>
    <div class="login-error" id="loginError"></div>
    <input type="password" id="loginPass" placeholder="Enter access code" autofocus>
    <button id="loginBtn">VIEW COLLECTION</button>
  </div>
</div>

<div id="app" class="hidden">
  <div class="hero">
    <div class="hero-top">
      <div class="hero-brands">
        <div class="kartel-mark"><svg viewBox="0 0 800 120" aria-label="Kartel"><use href="#kartel-logo"/></svg></div>
        <div class="brand-x">&times;</div>

<div class="modal-overlay" id="modal">
  <div class="modal-container" id="modalContainer">
    <div class="modal-main">
      <div class="modal-top-bar">
        <div class="modal-meta">
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-cat" id="modalCat"></div>
        </div>
        <div class="modal-actions">
          <span class="modal-pos" id="modalPos"></span>
          <button class="modal-btn" id="modalFullscreen" title="Fullscreen">&#x26F6;</button>
          <button class="modal-btn" id="modalClose">&times;</button>

      <div class="modal-player">
        <button class="modal-nav modal-prev" id="modalPrev">&#x2039;</button>
        <iframe id="modalFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        <button class="modal-nav modal-next" id="modalNext">&#x203A;</button>
      </div>
    </div>
    <div class="modal-sidebar">
      <div class="modal-sb-section">
        <div class="modal-sb-title">Video Details</div>
        <div class="modal-detail-row"><span class="modal-detail-label">Category</span><span class="modal-detail-value" id="mdCat">&mdash;</span></div>
        <div class="modal-detail-row"><span class="modal-detail-label">Resolution</span><span class="modal-detail-value" id="mdRes">&mdash;</span></div>
        <div class="modal-detail-row"><span class="modal-detail-label">Aspect Ratio</span><span class="modal-detail-value" id="mdAspect">&mdash;</span></div>
        <div class="modal-detail-row"><span class="modal-detail-label">Format</span><span class="modal-detail-value" id="mdFormat">&mdash;</span></div>
      </div>
      <div class="modal-sb-section">
        <div class="modal-sb-title" id="mdSectionTitle">In This Section</div>
        <div class="modal-section-list" id="modalSectionList"></div>
      </div>
    </div>

</div>

<footer id="footer" class="hidden">
  <div class="footer-collab">
    <svg viewBox="0 0 800 120" aria-label="Kartel"><use href="#kartel-logo"/></svg>
    <span class="fc-x">&times;</span>
    <span class="fc-client" id="footerClient"></span>
  </div>
  <p>&copy; 2026 Kartel AI &mdash; Confidential</p>
</footer>

<script>
// ═══════════════════════════════════════
// TECHNOLOGY & SAAS — COLLECTION DATA
// ═══════════════════════════════════════
const PASSWORD = 'TC-Kartel2026';

const params = new URLSearchParams(window.location.search);
const companyName = params.get('company') || 'Your Platform';

const sections = [
  {
    name: 'Platform & Product Creative',
    barColor: 'client',
    videos: [
      { name: 'CIP Client Dashboard Flow', id: '1DlTUE5Bew-q_lnAO33mFczyD9a5es6EZ', cat: 'Platform Demo' },
      { name: 'CIP Client Review Workflow', id: '13gB4Iuzv69QkxZVT26y1aJgUgnApNyL8', cat: 'Workflow Demo' },
      { name: 'CIP Upload Assets Flow', id: '1x-fhUrbSrNiLIizsDekxyjLRhLGFR7w9', cat: 'Workflow Demo' },
      { name: 'Marc Jacobs Workflow (ComfyUI)', id: '13PjUFyWHFqTN0tJhpnb8EwaOsfTFAkW3', cat: 'Technical Workflow' },
      { name: 'Car Workflow', id: '1GYhFPKEF4068f384EKzEM8rdquvYvzjg', cat: 'Product Visualization' }
    ]
  },
  {
    name: 'Brand & Marketing Assets',
    barColor: 'client',
    videos: [
      { name: 'Adidas Web', id: '1_QCdrPJORpK2E3k1EYNdrbAvnvuuT1fc', cat: 'Brand Digital' },
      { name: 'Porsche Web', id: '1MtpDJvibVf7OiRurhkskHS5h_kR18Zis', cat: 'Web Experience' },
      { name: 'BMW Spec Ad (Website)', id: '1uWo9yqvnlT9aUBa0-M8iYXM2u-32D8xj', cat: 'Web Experience' },
      { name: 'Heny Web', id: '1oA3n0NhCH39zHIyLBgGl8x-jfeGzd9qb', cat: 'Brand Digital' },
      { name: 'Everyday Dose', id: '1ra66S_KzowwPiC9iWF2WFXOfx6B9hWvW', cat: 'DTC Commercial' }
    ]
  },
  {
    name: 'Kartel Capabilities',
    barColor: 'green',
    videos: [
      { name: 'Kartel Demo', id: '1y8NezcoQlrnSm2YSoPmiz4yRXVLNtpy5', cat: 'Capabilities Reel' },
      { name: 'Kartel Scaling Creative Cut', id: '1aDMOw1wWAvFiOFsJTP0f3IVEgAB3wE-p', cat: 'Capabilities' },
      { name: 'New Reel Master', id: '1aTMvhs35gd6B_0fLM6M3xbV_EtdAczAQ', cat: 'Reel' },
      { name: 'Kartel CBS News Clip', id: '18gVdXetyWeWPLpk4j5XdMUzW7-zETAbA', cat: 'Press' }
    ]
  }
];

// ═══ INTRO VIDEO SPLASH ═══
const splash = document.getElementById('intro-splash');
const splashVideo = document.getElementById('splashVideo');
const splashEnter = document.getElementById('splashEnter');
document.getElementById('splashClient').textContent = companyName + ' \u00D7 Kartel';
let splashDismissed = false;

// Try to force play (browsers may block autoplay)
const playPromise = splashVideo.play();
if (playPromise !== undefined) {
  playPromise.catch(() => {
    // Autoplay blocked — try muted play
    splashVideo.muted = true;
    splashVideo.play().catch(() => {
      // Video truly can't play — skip splash
      dismissSplash();
    });
  });
}

// When video starts playing, show the enter button after 2s
splashVideo.addEventListener('playing', () => {
  setTimeout(() => splashEnter.classList.add('visible'), 2000);
});

// If video can't load at all, skip splash
splashVideo.addEventListener('error', () => dismissSplash());
// Also listen on last source element for fallback failure
const sources = splashVideo.querySelectorAll('source');
sources[sources.length - 1].addEventListener('error', () => dismissSplash());

// Safety timeout — if video hasn't started playing in 4s, skip
let splashTimeout = setTimeout(() => {
  if (splashVideo.readyState < 2) dismissSplash();
}, 4000);

// If video loads but sits on first frame, still show button
splashVideo.addEventListener('canplay', () => {
  setTimeout(() => splashEnter.classList.add('visible'), 2000);
});

document.getElementById('splashBtn').onclick = dismissSplash;
splash.addEventListener('touchend', e => { if (splashEnter.classList.contains('visible')) dismissSplash(); });

function dismissSplash() {
  if (splashDismissed) return;
  splashDismissed = true;
  clearTimeout(splashTimeout);
  splash.classList.add('fizzle');
  splashVideo.pause();
  setTimeout(() => {
    splash.classList.add('dismissed');
    document.getElementById('login-gate').classList.remove('hidden');
  }, 1200);
}

// ═══ LOGIN GATE ═══
document.getElementById('loginClient').textContent = companyName;
document.getElementById('loginSub').textContent = 'Private Collection';

const authKey = 'kartel_view_technology';
const gate = document.getElementById('login-gate');
if (sessionStorage.getItem(authKey) === '1') {
  splash.classList.add('dismissed');
  gate.classList.add('dismissed');
  gate.classList.remove('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('footer').classList.remove('hidden');
}
const check = () => {
  if (document.getElementById('loginPass').value === PASSWORD) {
    sessionStorage.setItem(authKey, '1');
    gate.classList.add('dismissed');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('footer').classList.remove('hidden');
  } else {
    document.getElementById('loginError').textContent = 'Incorrect access code';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginPass').focus();
  }
};
document.getElementById('loginBtn').onclick = check;
document.getElementById('loginPass').onkeydown = e => { if (e.key === 'Enter') check(); };

// ═══ HERO ═══
document.getElementById('clientMark').textContent = companyName;
document.getElementById('heroBadge').textContent = 'PRIVATE COLLECTION';
document.getElementById('heroTitle').innerHTML = 'Creative Infrastructure for <span>' + companyName + '</span>';
document.getElementById('heroDesc').textContent = "A curated look at how Kartel\u2019s AI-powered creative systems integrate with product, marketing, and sales workflows \u2014 producing on-brand assets across every surface without manual QA loops.";
document.getElementById('footerClient').textContent = companyName;

// ═══ STATS ═══
let totalVideos = 0;
sections.forEach(s => { if (s.videos) totalVideos += s.videos.length; });

document.getElementById('heroStats').innerHTML = `
  <div class="hero-stat"><div class="hero-stat-value">${totalVideos}</div><div class="hero-stat-label">Videos</div></div>
  <div class="hero-stat"><div class="hero-stat-value">${sections.length}</div><div class="hero-stat-label">Sections</div></div>
`;

// ═══ SECTIONS ═══
const content = document.getElementById('content');
sections.forEach((sec, idx) => {
  const div = document.createElement('div');
  div.className = 'section';
  div.style.animationDelay = `${idx * 0.08}s`;
  const itemCount = sec.videos ? sec.videos.length : 0;
  let gridHTML = '';

  if (sec.videos) {
    gridHTML += sec.videos.map(v => `
      <div class="card" data-id="${v.id}" data-name="${v.name}" data-cat="${v.cat}">
        <div class="card-thumb">
          <img class="loading" src="https://lh3.googleusercontent.com/d/${v.id}=w640-h360-p-k-nu-iv1" alt="${v.name}" loading="lazy" onload="this.classList.remove('loading')" onerror="tryFallback(this,'${v.id}')">
          <div class="play-btn"></div>
        </div>
        <div class="card-info"><h3>${v.name}</h3><p>${v.cat}</p></div>
      </div>`).join('');
  }

  div.innerHTML = `<div class="section-header"><div class="section-bar ${sec.barColor}"></div><span class="section-title">${sec.name}</span><span class="section-count">${itemCount}</span></div><div class="grid">${gridHTML}</div>`;
  content.appendChild(div);
});

// Enhanced Modal
const modal = document.getElementById('modal');
const modalFrame = document.getElementById('modalFrame');
const modalContainer = document.getElementById('modalContainer');
let currentSectionVideos = [];
let currentVideoIdx = 0;

function parseVideoMeta(name) {
  const n = name.toUpperCase();
  let res = '1920\u00D71080', aspect = '16:9', format = 'MP4';
  if (n.includes('4K')) res = '3840\u00D72160';
  if (n.includes('9X16') || n.includes('9\u00D716')) aspect = '9:16';
  else if (n.includes('4X5') || n.includes('4\u00D75')) aspect = '4:5';
  else if (n.includes('1X1') || n.includes('1\u00D71')) aspect = '1:1';
  if (n.includes('H264')) format = 'H.264 / MP4';
  else if (n.includes('MASTER')) format = 'Master';
  return { res, aspect, format };
}

function loadModalVideo(idx) {
  const v = currentSectionVideos[idx];
  if (!v) return;
  currentVideoIdx = idx;
  modalFrame.src = `https://drive.google.com/file/d/${v.id}/preview`;
  document.getElementById('modalTitle').textContent = v.name;
  document.getElementById('modalCat').textContent = v.cat;
  document.getElementById('modalPos').textContent = `${idx+1} / ${currentSectionVideos.length}`;
  document.getElementById('modalPrev').disabled = idx === 0;
  document.getElementById('modalNext').disabled = idx === currentSectionVideos.length - 1;
  const meta = parseVideoMeta(v.name);
  document.getElementById('mdCat').textContent = v.cat;
  document.getElementById('mdRes').textContent = meta.res;
  document.getElementById('mdAspect').textContent = meta.aspect;
  document.getElementById('mdFormat').textContent = meta.format;
  const listEl = document.getElementById('modalSectionList');
  listEl.innerHTML = currentSectionVideos.map((sv, i) => `
    <div class="modal-section-item${i===idx?' active':''}" data-idx="${i}">
      <div class="msi-thumb"><img src="https://lh3.googleusercontent.com/d/${sv.id}=w120-h68-p-k-nu-iv1" alt="" loading="lazy" onerror="this.style.display='none'"></div>
      <span class="msi-name">${sv.name}</span>
    </div>`).join('');
  setTimeout(() => { const a = listEl.querySelector('.active'); if (a) a.scrollIntoView({block:'nearest',behavior:'smooth'}); }, 100);
}

document.addEventListener('click', e => {
  const card = e.target.closest('.card:not(.placeholder)');
  if (card && !e.target.closest('.modal-overlay')) {
    if(hoveredCard){hoveredCard.classList.remove('hover-expanded');hoveredCard.closest('.section')?.classList.remove('section-elevated');const hp=hoveredCard.querySelector('.card-video-overlay.hover-preview');if(hp){hp.src='';hp.remove();}hoveredCard=null;}if(hoverTimer)clearTimeout(hoverTimer);
    const section = card.closest('.section');
    const sectionCards = section ? [...section.querySelectorAll('.card:not(.placeholder)')] : [card];
    currentSectionVideos = sectionCards.map(c => ({id:c.dataset.id, name:c.dataset.name, cat:c.dataset.cat}));
    currentVideoIdx = currentSectionVideos.findIndex(v => v.id === card.dataset.id);
    if (currentVideoIdx < 0) currentVideoIdx = 0;
    loadModalVideo(currentVideoIdx);
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
});
document.getElementById('modalSectionList').addEventListener('click', e => {
  const item = e.target.closest('.modal-section-item');
  if (item) loadModalVideo(parseInt(item.dataset.idx));
});
document.getElementById('modalPrev').onclick = () => { if (currentVideoIdx > 0) loadModalVideo(currentVideoIdx - 1); };
document.getElementById('modalNext').onclick = () => { if (currentVideoIdx < currentSectionVideos.length - 1) loadModalVideo(currentVideoIdx + 1); };
document.getElementById('modalFullscreen').onclick = () => { modalContainer.classList.toggle('fullscreen'); };

function closeModal() { modal.classList.remove('active'); modalContainer.classList.remove('fullscreen'); modalFrame.src = ''; document.body.style.overflow = ''; }
document.getElementById('modalClose').onclick = closeModal;
modal.onclick = e => { if (e.target === modal) closeModal(); };
document.onkeydown = e => {
  if (!modal.classList.contains('active')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft' && currentVideoIdx > 0) loadModalVideo(currentVideoIdx - 1);
  if (e.key === 'ArrowRight' && currentVideoIdx < currentSectionVideos.length - 1) loadModalVideo(currentVideoIdx + 1);
};

// Thumbnail fallback
function tryFallback(img, id) {
  const src = img.src;
  if (src.includes('lh3.googleusercontent')) img.src = `https://drive.google.com/thumbnail?id=${id}&sz=w640`;
  else if (src.includes('sz=w640')) img.src = `https://drive.google.com/thumbnail?id=${id}&sz=w400`;
  else {
    const thumb = img.closest('.card-thumb');
    if (thumb) {
      img.style.display = 'none';
      if (!thumb.querySelector('.thumb-placeholder')) {
        const ph = document.createElement('div');
        ph.className = 'thumb-placeholder';
        ph.innerHTML = `<div class="tp-play"></div><div class="tp-name">${(img.alt||'').substring(0,30)}</div>`;
        thumb.insertBefore(ph, thumb.querySelector('.play-btn'));
      }
    }
  }
}
setTimeout(() => {
  document.querySelectorAll('.card-thumb img.loading').forEach(img => {
    if (!img.naturalWidth || img.naturalWidth < 2) {
      const id = img.closest('.card')?.dataset.id;
      if (id) tryFallback(img, id);
    }
  });
}, 8000);

// ─── AUTOPLAY ON SCROLL ───
let activeAutoplaySection = null;
function activateAutoplay(section) {
  if (activeAutoplaySection === section) return;
  if (activeAutoplaySection) deactivateAutoplay(activeAutoplaySection);
  activeAutoplaySection = section;
  const cards = [...section.querySelectorAll('.card:not(.placeholder):not(.hidden)')];
  cards.forEach((card, i) => {
    const id = card.dataset.id;
    if (!id) return;
    setTimeout(() => {
      if (activeAutoplaySection !== section) return;
      if (card.querySelector('.card-video-overlay')) return;
      const iframe = document.createElement('iframe');
      iframe.className = 'card-video-overlay';
      iframe.src = `https://drive.google.com/file/d/${id}/preview`;
      iframe.allow = 'autoplay; encrypted-media';
      iframe.setAttribute('tabindex', '-1');
      card.querySelector('.card-thumb').appendChild(iframe);
      card.classList.add('autoplay-active');
    }, i * 150);
  });
}
function deactivateAutoplay(section) {
  section.querySelectorAll('.card').forEach(card => {
    card.classList.remove('autoplay-active');
    const ov = card.querySelector('.card-video-overlay:not(.hover-preview)');
    if (ov) { ov.src = ''; ov.remove(); }
  });
  if (activeAutoplaySection === section) activeAutoplaySection = null;
}
const sectionObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) activateAutoplay(entry.target);
    else deactivateAutoplay(entry.target);
  });
}, { threshold: 0.3 });
document.querySelectorAll('.section').forEach(s => sectionObserver.observe(s));

// ─── HOVER EXPAND PREVIEW (0.5s delay) ───
let hoverTimer = null;
let hoveredCard = null;
document.addEventListener('mouseover', e => {
  const card = e.target.closest('.card:not(.placeholder)');
  if (card === hoveredCard) return;
  if (hoverTimer) clearTimeout(hoverTimer);
  if (hoveredCard) {
    hoveredCard.classList.remove('hover-expanded');
    hoveredCard.closest('.section')?.classList.remove('section-elevated');
    const hp = hoveredCard.querySelector('.card-video-overlay.hover-preview');
    if (hp) { hp.src = ''; hp.remove(); }
  }
  if (card) {
    hoveredCard = card;
    hoverTimer = setTimeout(() => {
      card.classList.add('hover-expanded');
      card.closest('.section')?.classList.add('section-elevated');
      if (!card.querySelector('.card-video-overlay')) {
        const id = card.dataset.id;
        if (id) {
          const iframe = document.createElement('iframe');
          iframe.className = 'card-video-overlay hover-preview';
          iframe.src = `https://drive.google.com/file/d/${id}/preview`;
          iframe.allow = 'autoplay; encrypted-media';
          iframe.setAttribute('tabindex', '-1');
          card.querySelector('.card-thumb').appendChild(iframe);
          requestAnimationFrame(() => iframe.style.opacity = '1');
        }
      }
    }, 500);
  } else { hoveredCard = null; }
});
document.addEventListener('mouseout', e => {
  const card = e.target.closest('.card');
  if (card && !card.contains(e.relatedTarget)) {
    if (hoverTimer) clearTimeout(hoverTimer);
    card.classList.remove('hover-expanded');
    card.closest('.section')?.classList.remove('section-elevated');
    const hp = card.querySelector('.card-video-overlay.hover-preview');
    if (hp) { hp.src = ''; hp.remove(); }
    if (hoveredCard === card) hoveredCard = null;
  }
});
</script>
